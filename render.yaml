# Render Blueprint (Infrastructure as Code)
# https://render.com/docs/blueprint-spec

databases:
  - name: websale-db
    plan: free
    databaseName: websale
    user: websale

services:
  - type: web
    name: websale
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn Websale.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: websale-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
